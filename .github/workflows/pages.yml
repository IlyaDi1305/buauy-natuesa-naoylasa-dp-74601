name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github_pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: .
      - uses: actions/deploy-pages@v4.0.5
